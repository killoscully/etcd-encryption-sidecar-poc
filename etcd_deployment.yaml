apiVersion: apps/v1
kind: Deployment
metadata:
  name: etcd
  labels:
    app: etcd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: etcd
  template:
    metadata:
      labels:
        app: etcd
    spec:
      containers:
        - name: etcd
          image: quay.io/coreos/etcd:v3.5.0
          command:
            - /usr/local/bin/etcd
          args:
            - "--name"
            - "etcd-node"
            - "--data-dir"
            - "/var/lib/etcd"
            - "--advertise-client-urls"
            - "http://0.0.0.0:2379"
            - "--listen-client-urls"
            - "http://0.0.0.0:2379"
          ports:
            - containerPort: 2379
