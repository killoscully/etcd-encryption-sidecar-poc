apiVersion: apps/v1
kind: Deployment
metadata:
  name: encryption-sidecar
  namespace: etcd-dissertation
  labels:
    app: encryption-sidecar
spec:
  replicas: 1
  selector:
    matchLabels:
      app: encryption-sidecar
  template:
    metadata:
      labels:
        app: encryption-sidecar
    spec:
      containers:
        - name: encryption-sidecar
          image: etcd-encryption-sidecar:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: ETCD_HOST
              value: etcd
            - name: ETCD_PORT
              value: "2379"
            - name: ENCRYPTION_TYPE
              value: PLAINTEXT
            - name: ENCRYPTION_KEY_DATA
              valueFrom:
                secretKeyRef:
                  name: sidecar-keys
                  key: ENCRYPTION_KEY_DATA
          ports:
            - containerPort: 5000
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: sidecar
  namespace: etcd-dissertation
spec:
  selector:
    app: encryption-sidecar
  ports:
    - name: http
      port: 5000
      targetPort: 5000
